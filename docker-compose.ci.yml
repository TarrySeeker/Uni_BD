# =============================================================================
# Admik — оверлей docker compose ТОЛЬКО для CI (job `docker-smoke` в ci.yml)
# =============================================================================
# Подключается поверх docker-compose.yml через переменную окружения
#   COMPOSE_FILE=docker-compose.yml:docker-compose.ci.yml
# (см. .github/workflows/ci.yml). Прод-поведение основного compose НЕ меняется —
# этот файл в обычном развёртывании не используется.
#
# Зачем нужен:
#   1. Опубликовать порт приложения наружу, чтобы host-смок (scripts/smoke.sh)
#      бил по http://localhost:3000 НАПРЯМУЮ, минуя Caddy (в CI нет домена/TLS,
#      поэтому Caddy на 80/443 не поднимаем).
#   2. Не давать healthcheck'ам кеша/медиа блокировать запуск app в эфемерном
#      раннере: приложение ходит в Redis/MinIO лениво, а smoke их не задействует.
#      Жёстко ждём только готовность БД (pg_isready) — этого достаточно и это
#      надёжно. Так гейт не зависит от наличия `mc` в образе minio и т.п.
# -----------------------------------------------------------------------------
services:
  app:
    # Публикуем порт приложения на хост раннера (для scripts/smoke.sh).
    ports:
      - "3000:3000"
    # В CI app зависит ЖЁСТКО только от готовности БД; Redis/MinIO достаточно
    # «запущены» (started), а не «здоровы» (healthy).
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
